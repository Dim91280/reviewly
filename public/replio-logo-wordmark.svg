<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img">
  <title>Replio</title>
  <!-- Icon 60x60 -->
  <!-- Couche 1 : fond indigo -->
  <rect x="0" y="0" width="60" height="60" rx="13" fill="#6366f1"/>
  <!-- Couche 2 : panneau blanc -->
  <rect x="4" y="4" width="52" height="52" rx="9" fill="white"/>
  <!-- Couche 3 : inner ring indigo -->
  <rect x="7" y="7" width="46" height="46" rx="6" fill="none" stroke="#6366f1" stroke-width="0.9"/>
  <!-- Couche 4 : inner ring léger -->
  <rect x="10" y="10" width="40" height="40" rx="4" fill="none" stroke="#c7d2fe" stroke-width="0.6"/>
  <!-- R — jambe verticale -->
  <rect x="15" y="13" width="5" height="34" rx="2" fill="#6366f1"/>
  <!-- R — bosse -->
  <path d="M20 13 L32 13 Q40 13 40 22 Q40 30 32 30 L20 30" fill="none" stroke="#6366f1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- R — jambe diagonale -->
  <line x1="21" y1="28" x2="40" y2="47" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="76"
    y="40"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#18181b"
    letter-spacing="-1.2"
  >replio</text>
</svg>
